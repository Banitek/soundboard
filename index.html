<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Archive</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; max-width: 800px; margin: 0 auto; }
        .card { background: #1e1e1e; border-radius: 8px; overflow: hidden; cursor: pointer; transition: transform 0.2s; }
        .card:active { transform: scale(0.95); }
        .card img { width: 100%; height: 140px; object-fit: cover; }
        .card p { margin: 8px 0; font-size: 14px; }
    </style>
</head>
<body>

    <h2>Our Memories</h2>
    <div class="grid">
        <div class="card" onclick="playAudio('audio(1).mp3')"><img src="photo(1).jpg" alt="Memory 1"><p>Memory 1</p></div>
        <div class="card" onclick="playAudio('audio(2).mp3')"><img src="photo(2).jpg" alt="Memory 2"><p>Memory 2</p></div>
        <div class="card" onclick="playAudio('audio(3).mp3')"><img src="photo(3).jpg" alt="Memory 3"><p>Memory 3</p></div>
        <div class="card" onclick="playAudio('audio(4).mp3')"><img src="photo(4).jpg" alt="Memory 4"><p>Memory 4</p></div>
        <div class="card" onclick="playAudio('audio(5).mp3')"><img src="photo(5).jpg" alt="Memory 5"><p>Memory 5</p></div>
        <div class="card" onclick="playAudio('audio(6).mp3')"><img src="photo(6).jpg" alt="Memory 6"><p>Memory 6</p></div>
        <div class="card" onclick="playAudio('audio(7).mp3')"><img src="photo(7).jpg" alt="Memory 7"><p>Memory 7</p></div>
        <div class="card" onclick="playAudio('audio(8).mp3')"><img src="photo(8).jpg" alt="Memory 8"><p>Memory 8</p></div>
        <div class="card" onclick="playAudio('audio(9).mp3')"><img src="photo(9).jpg" alt="Memory 9"><p>Memory 9</p></div>
        <div class="card" onclick="playAudio('audio(10).mp3')"><img src="photo(10).jpg" alt="Memory 10"><p>Memory 10</p></div>
    </div>

    <script>
        let currentAudio = null;
        function playAudio(file) {
            if (currentAudio) { currentAudio.pause(); }
            currentAudio = new Audio(file);
            currentAudio.play();
        }
    </script>
</body>
</html>
