<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Soundboard</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 {
            margin-bottom: 20px;
            font-weight: 600;
            letter-spacing: 1px;
            font-size: 1.8rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 columns on mobile screens */
            gap: 10px;
            max-width: 600px;
            width: 100%;
        }

        /* Desktop and tablet layout adjustment */
        @media (min-width: 600px) {
            .grid {
                grid-template-columns: repeat(5, 1fr); /* 5 columns on Chromebook/PC */
                max-width: 900px;
                gap: 15px;
            }
        }

        .sound-btn {
            background-color: #1e1e1e;
            border: 2px solid #333333;
            border-radius: 12px;
            color: #ffffff;
            padding: 18px 5px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            text-align: center;
            word-wrap: break-word;
        }

        .sound-btn:hover {
            background-color: #2a2a2a;
            border-color: #00adb5;
            transform: translateY(-2px);
        }

        .sound-btn:active {
            transform: translateY(1px);
            box-shadow: 0 2px 3px rgba(0, 0, 0, 0.5);
            background-color: #00adb5;
            color: #121212;
        }
    </style>
</head>
<body>

    <h1>SOUNDBOARD</h1>

    <div class="grid">
        <button class="sound-btn" onclick="playSound('sound1.mp3')">Sound 1</button>
        <button class="sound-btn" onclick="playSound('sound2.mp3')">Sound 2</button>
        <button class="sound-btn" onclick="playSound('sound3.mp3')">Sound 3</button>
        <button class="sound-btn" onclick="playSound('sound4.mp3')">Sound 4</button>
        <button class="sound-btn" onclick="playSound('sound5.mp3')">Sound 5</button>
        
        <button class="sound-btn" onclick="playSound('sound6.mp3')">Sound 6</button>
        <button class="sound-btn" onclick="playSound('sound7.mp3')">Sound 7</button>
        <button class="sound-btn" onclick="playSound('sound8.mp3')">Sound 8</button>
        <button class="sound-btn" onclick="playSound('sound9.mp3')">Sound 9</button>
        <button class="sound-btn" onclick="playSound('sound10.mp3')">Sound 10</button>

        <button class="sound-btn" onclick="playSound('sound11.mp3')">Sound 11</button>
        <button class="sound-btn" onclick="playSound('sound12.mp3')">Sound 12</button>
        <button class="sound-btn" onclick="playSound('sound13.mp3')">Sound 13</button>
        <button class="sound-btn" onclick="playSound('sound14.mp3')">Sound 14</button>
        <button class="sound-btn" onclick="playSound('sound15.mp3')">Sound 15</button>

        <button class="sound-btn" onclick="playSound('sound16.mp3')">Sound 16</button>
        <button class="sound-btn" onclick="playSound('sound17.mp3')">Sound 17</button>
        <button class="sound-btn" onclick="playSound('sound18.mp3')">Sound 18</button>
        <button class="sound-btn" onclick="playSound('sound19.mp3')">Sound 19</button>
        <button class="sound-btn" onclick="playSound('sound20.mp3')">Sound 20</button>

        <button class="sound-btn" onclick="playSound('sound21.mp3')">Sound 21</button>
        <button class="sound-btn" onclick="playSound('sound22.mp3')">Sound 22</button>
        <button class="sound-btn" onclick="playSound('sound23.mp3')">Sound 23</button>
        <button class="sound-btn" onclick="playSound('sound24.mp3')">Sound 24</button>
        <button class="sound-btn" onclick="playSound('sound25.mp3')">Sound 25</button>

        <button class="sound-btn" onclick="playSound('sound26.mp3')">Sound 26</button>
        <button class="sound-btn" onclick="playSound('sound27.mp3')">Sound 27</button>
        <button class="sound-btn" onclick="playSound('sound28.mp3')">Sound 28</button>
        <button class="sound-btn" onclick="playSound('sound29.mp3')">Sound 29</button>
    </div>

    <script>
        let currentAudio = null;

        function playSound(audioPath) {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
            }

            currentAudio = new Audio(audioPath);
            currentAudio.play().catch(error => {
                console.error("Audio playback failed. Check your file paths and names.", error);
            });
        }
    </script>

</body>
</html>
